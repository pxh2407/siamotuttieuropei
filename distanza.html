<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#003399">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Siamo Tutti Europei — a distanza (PROVA)</title>
<style>
  :root{
    --blu:#003399;        /* blu bandiera UE */
    --oro:#FFCC00;        /* oro bandiera UE */
    --blu-chiaro:#2E77D0;
    --verde:#1f8a3b;
    --rosso:#C0392B;
    --mare:#cfe3f7;
    --carta:#fffdf5;
    --testo:#1a1a2e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;font-family:"Segoe UI",Tahoma,Verdana,sans-serif;color:var(--testo);background:#eef3fb;font-size:18px;}
  h1,h2,h3{margin:.2em 0;}
  button{font-family:inherit;font-size:1rem;cursor:pointer;border:none;border-radius:10px;padding:.6em 1em;background:var(--blu);color:#fff;font-weight:600;transition:transform .08s,box-shadow .15s;}
  button:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.2);}
  button:disabled{opacity:.45;cursor:not-allowed;}
  button.oro{background:var(--oro);color:#222;}
  button.verde{background:var(--verde);}
  button.rosso{background:var(--rosso);}
  button.ghost{background:#fff;color:var(--blu);border:2px solid var(--blu);}

  /* ---- SCHERMATA INIZIALE ---- */
  #setup{max-width:760px;margin:24px auto;background:var(--carta);border-radius:18px;padding:28px 32px;box-shadow:0 8px 30px rgba(0,0,0,.12);border-top:8px solid var(--oro);}
  #setup h1{color:var(--blu);font-size:2.4rem;letter-spacing:.5px;}
  .stelle{color:var(--oro);font-size:1.6rem;letter-spacing:2px;}
  .num-giocatori{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0;}
  .num-giocatori button{min-width:54px;}
  .num-giocatori button.sel{background:var(--oro);color:#222;outline:3px solid var(--blu);}
  .riga-nome{display:flex;align-items:center;gap:10px;margin:8px 0;}
  .riga-nome .pallino{width:22px;height:22px;border-radius:50%;flex:0 0 auto;border:2px solid #0003;}
  .riga-nome input{flex:1;font-size:1.1rem;padding:.5em .7em;border:2px solid #bbb;border-radius:8px;}

  /* ---- GIOCO ---- */
  #gioco{display:none;}
  .topbar{background:var(--blu);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 18px;flex-wrap:wrap;gap:8px;}
  .topbar h1{font-size:1.4rem;}
  .topbar .stelle{font-size:1.1rem;}
  .layout{display:flex;gap:16px;padding:16px;align-items:flex-start;flex-wrap:wrap;}
  .mappa-box{flex:1 1 560px;min-width:340px;background:var(--carta);border-radius:16px;padding:10px;box-shadow:0 6px 20px rgba(0,0,0,.1);}
  svg{width:100%;height:auto;display:block;border-radius:12px;background:var(--mare);}
  .pannello{flex:1 1 360px;min-width:320px;display:flex;flex-direction:column;gap:14px;}
  /* ---- ALTERNANZA AUTOMATICA tabellone/pannello: si vede una sezione alla volta,
         così il tabellone può usare tutto lo schermo ---- */
  #gioco.vista-tab .pannello{display:none;}
  #gioco.vista-tab .mappa-box{flex:1 1 100%;}
  #gioco.vista-pan .mappa-box{display:none;}
  #gioco.vista-pan .pannello{flex:1 1 100%;max-width:860px;margin:0 auto;}
  #boardBar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:1.1rem;font-weight:700;padding:2px 8px 8px;}
  #boardBar .bb-chip{background:#fff;border:2px solid var(--blu);border-radius:12px;padding:2px 12px;}
  .card{background:var(--carta);border-radius:14px;padding:14px 16px;box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .turno-banner{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:10px;border-left:10px solid #999;padding-left:12px;}
  .dado-area{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .dado{width:64px;height:64px;border-radius:12px;background:#fff;border:3px solid var(--blu);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:var(--blu);}
  #actions{display:flex;flex-direction:column;gap:8px;}
  #actions button{text-align:left;}
  .scorerow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #0001;}
  .scorerow .pallino{width:18px;height:18px;border-radius:50%;flex:0 0 auto;}
  .scorerow.attivo{background:#fff7d6;border-radius:8px;padding:6px;}
  .merce-chip{display:inline-block;background:#eef;border-radius:20px;padding:2px 10px;margin:2px;font-size:.95rem;border:1px solid #ccd;}
  .contratto{background:#eef6ff;border:2px dashed var(--blu-chiaro);border-radius:10px;padding:8px 10px;margin-top:6px;font-size:1.05rem;}
  #log{height:150px;overflow-y:auto;font-size:.95rem;background:#fff;border-radius:8px;padding:8px;border:1px solid #ddd;}
  #log p{margin:2px 0;padding:2px 4px;border-radius:4px;}
  details summary{cursor:pointer;font-weight:600;color:var(--blu);}
  details p,details li{font-size:.98rem;line-height:1.4;}

  /* ---- MODALE ---- */
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,20,60,.55);align-items:center;justify-content:center;z-index:50;padding:16px;}
  #modal{background:#fff;border-radius:18px;max-width:560px;width:100%;padding:26px;box-shadow:0 10px 40px rgba(0,0,0,.4);border-top:10px solid var(--oro);animation:pop .25s ease;max-height:90vh;overflow-y:auto;}
  @keyframes pop{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
  #modal h2{color:var(--blu);}
  .opzioni{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .opzioni button{font-size:1.1rem;padding:.8em 1em;background:#fff;color:var(--testo);border:2px solid var(--blu);}
  .opzioni button:hover{background:#eef3ff;}
  .opzioni button.giusta{background:var(--verde);color:#fff;border-color:var(--verde);}
  .opzioni button.sbagliata{background:var(--rosso);color:#fff;border-color:var(--rosso);}
  .feedback{font-size:1.15rem;font-weight:700;margin-top:14px;text-align:center;}
  .tmr{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .tmr .barra{flex:1;height:12px;background:#e5e9f0;border-radius:8px;overflow:hidden;}
  .tmr .barra>div{height:100%;background:var(--verde);width:100%;transition:width 1s linear;}
  .tmr .sec{font-weight:800;color:var(--blu);min-width:44px;text-align:right;}
  .truck-label{font-weight:700;}
  @media(max-width:600px){html,body{font-size:16px;}}
</style>
</head>
<body>

<!-- ================= SCHERMATA INIZIALE ================= -->
<div id="setup">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
    <div class="stelle">★★★★★★★★★★★★</div>
    <button class="ghost btnLang" onclick="toggleLang()">🌐 English</button>
  </div>
  <h1>SIAMO TUTTI EUROPEI</h1>
  <p id="introTxt" style="font-size:1.1rem;"></p>

  <div id="resumeBox" style="display:none;margin:12px 0;">
    <button id="btnResume" class="verde" style="font-size:1.15rem;" onclick="riprendiPartita()"></button>
  </div>

  <h3 id="hNum"></h3>
  <div class="num-giocatori" id="numGiocatori"></div>

  <h3 id="hNomi"></h3>
  <div id="righeNomi"></div>

  <div style="margin-top:14px;padding:10px 14px;background:#eef3ff;border:2px solid var(--blu-chiaro);border-radius:10px;">
    <label style="font-size:1.05rem;font-weight:600;"><input type="checkbox" id="botOn" checked> <span id="lblBot"></span></label>
    <div style="margin-top:8px;">
      <span id="lblBotDiff" style="font-weight:600;"></span>
      <select id="botDiffSel" style="font-size:1rem;padding:.3em;border-radius:6px;">
        <option value="0.45" id="optFacile"></option>
        <option value="0.65" selected id="optNormale"></option>
        <option value="0.85" id="optDifficile"></option>
      </select>
    </div>
  </div>

  <div style="margin-top:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <button id="btnStart" class="oro" style="font-size:1.25rem;padding:.7em 1.6em;" onclick="avviaPartita()"></button>
    <label style="font-size:1rem;"><input type="checkbox" id="audioOn" checked> <span id="lblSuoni"></span></label>
  </div>

  <div style="margin-top:14px;">
    <button id="btnInstall" class="ghost" style="font-size:.95rem;" onclick="installaIcona()"></button>
  </div>

  <!-- Gioco a distanza (case diverse) -->
  <div id="remotoBox" style="margin-top:18px;padding:12px 14px;background:#eef9f0;border:2px solid var(--verde);border-radius:10px;">
    <h3 id="hRemoto" style="margin:0 0 8px;"></h3>
    <p id="pRemoto" style="margin:0 0 10px;font-size:1rem;"></p>
    <div id="remotoScelte" style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="verde" id="btnCreaRem" onclick="remoteCreaUI()"></button>
      <button class="ghost" id="btnEntraRem" onclick="remoteEntraUI()"></button>
    </div>
    <div id="remotoPannello" style="display:none;margin-top:10px;"></div>
    <details style="margin-top:12px;">
      <summary id="sumRemoto" style="cursor:pointer;font-weight:600;"></summary>
      <div id="txtRemoto" style="font-size:1rem;line-height:1.5;margin-top:8px;"></div>
    </details>
  </div>

  <details style="margin-top:20px;">
    <summary id="sumRegole"></summary>
    <ul id="ulRegole"></ul>
  </details>
</div>

<!-- ================= GIOCO ================= -->
<div id="gioco">
  <div class="topbar">
    <h1>🇪🇺 Siamo Tutti Europei</h1>
    <div class="stelle">★★★★★★★★★★★★</div>
    <div>
      <button class="ghost btnLang" style="background:transparent;color:#fff;border-color:#fff;" onclick="toggleLang()">🌐 English</button>
      <button id="btnVista" class="ghost" style="background:transparent;color:#fff;border-color:#fff;" onclick="toggleVista()">🗺 Tabellone</button>
      <button id="btnRegole" class="ghost" style="background:transparent;color:#fff;border-color:#fff;" onclick="mostraRegole()">📖 Regole</button>
      <button class="ghost" style="background:transparent;color:#fff;border-color:#fff;" onclick="toggleAudio()" id="btnAudio">🔊</button>
      <button id="btnNuova" class="ghost" style="background:transparent;color:#fff;border-color:#fff;" onclick="nuovaPartita()">↺ Nuova partita</button>
    </div>
  </div>

  <div class="layout">
    <div class="mappa-box">
      <div id="boardBar"></div>
      <svg id="board" viewBox="0 0 2344 1310" aria-label="Tabellone di gioco"></svg>
    </div>

    <div class="pannello">
      <div class="card">
        <div class="turno-banner" id="turnoBanner">Tocca a…</div>
        <div class="dado-area" style="margin-top:12px;">
          <div class="dado" id="dadoView">–</div>
          <button class="oro" id="btnDado" style="font-size:1.15rem;" onclick="tiraDado()">🎲 Tira il dado</button>
        </div>
        <div id="actions" style="margin-top:12px;"></div>
      </div>

      <div class="card" id="cardGiocatore"></div>

      <div class="card">
        <h3 id="hClass" style="margin-top:0;">🏆 Classifica</h3>
        <div id="scoreboard"></div>
      </div>

      <div class="card">
        <h3 id="hDiario" style="margin-top:0;">📜 Diario di gioco</h3>
        <div id="log"></div>
      </div>
    </div>
  </div>
</div>

<!-- ================= MODALE ================= -->
<div id="overlay"><div id="modal"></div></div>

<script>
/* ============================================================
   DATI DI GIOCO
   ============================================================ */
const MERCI = {
  Formaggio:"🧀", Auto:"🚗", Orologi:"⌚", Vino:"🍷", Legname:"🪵",
  Grano:"🌾", Fiori:"🌷", Pesce:"🐟"
};
const NAZIONI = ["Italia","Svizzera","Germania","Belgio","Francia","Spagna","Austria",
                 "Portogallo","Paesi Bassi","Polonia","Lituania","Lettonia","Estonia","Danimarca","Norvegia"];

/* ============================================================
   LINGUA (Italiano / English)
   ============================================================ */
let lang = 'it';
function tr(it,en){ return lang==='en'?en:it; }          // testo a due lingue
const _k = ()=> lang==='en'?1:0;
const NAZ_T = {                                          // nomi nazioni
  Italia:["Italia","Italy"], Svizzera:["Svizzera","Switzerland"], Germania:["Germania","Germany"],
  Belgio:["Belgio","Belgium"], Francia:["Francia","France"], Spagna:["Spagna","Spain"], Austria:["Austria","Austria"],
  Portogallo:["Portogallo","Portugal"], "Paesi Bassi":["Paesi Bassi","Netherlands"], Polonia:["Polonia","Poland"],
  Lituania:["Lituania","Lithuania"], Lettonia:["Lettonia","Latvia"], Estonia:["Estonia","Estonia"],
  Danimarca:["Danimarca","Denmark"], Norvegia:["Norvegia","Norway"]
};
const MERCE_T = {                                        // nomi merci
  Formaggio:["Formaggio","Cheese"], Auto:["Auto","Car"], Orologi:["Orologi","Watches"],
  Vino:["Vino","Wine"], Legname:["Legname","Timber"],
  Grano:["Grano","Wheat"], Fiori:["Fiori","Flowers"], Pesce:["Pesce","Fish"]
};
const CITY_T = {                                         // nomi città (solo dove differiscono)
  Roma:"Rome", Milano:"Milan", Napoli:"Naples", Venezia:"Venice", Monaco:"Munich",
  Colonia:"Cologne", Bruxelles:"Brussels", Anversa:"Antwerp", Parigi:"Paris", Lione:"Lyon",
  Marsiglia:"Marseille", Barcellona:"Barcelona", Siviglia:"Seville", Ginevra:"Geneva",
  Berna:"Bern", Zurigo:"Zurich",
  Lisbona:"Lisbon", Copenaghen:"Copenhagen", Varsavia:"Warsaw", Breslavia:"Wrocław",
  Danzica:"Gdańsk", Tolosa:"Toulouse", Strasburgo:"Strasbourg", Francoforte:"Frankfurt",
  Basilea:"Basel", Salisburgo:"Salzburg", Cracovia:"Krakow", "L'Aia":"The Hague",
  Gand:"Ghent"
};
function naz(n){ return NAZ_T[n]?NAZ_T[n][_k()]:n; }
function merce(g){ return MERCE_T[g]?MERCE_T[g][_k()]:g; }
function citta(c){ return (lang==='en'&&CITY_T[c])?CITY_T[c]:c; }
function locQ(q){ // localizza una domanda e mescola l'ordine delle risposte
  const i=_k();
  const idx=q.o.map((_,j)=>j);
  for(let j=idx.length-1;j>0;j--){ const r=Math.floor(Math.random()*(j+1)); [idx[j],idx[r]]=[idx[r],idx[j]]; }
  return {q:q.q[i], o:idx.map(j=>q.o[j][i]), a:idx.indexOf(q.a)};
}

// Caselle del percorso: {n=nazione, t=tipo, city, goods?}
// tipo: normal | frontier | blue | arena | pickup
// La posizione sullo schermo è calcolata da cellXY(i): l'ordine dell'array È il percorso.
// EQUITÀ: ogni nazione ha esattamente 4 città e una sola dogana d'ingresso (15 blocchi).
// Giro d'Europa: Italia → Svizzera → Austria → Germania → Polonia → Lituania → Lettonia
// → Estonia → Danimarca → Norvegia → Paesi Bassi → Belgio → Francia → Spagna → Portogallo
// → nave verso l'Italia, si riparte da Roma.
const CELLE = [
  {n:"Italia",      t:"pickup",  city:"Roma",       goods:["Vino","Formaggio"]},

const N = CELLE.length;
const MAX_CARICO = 3;   // merci massime trasportabili sul camion

// Domande per nazione — formato bilingue: q:[it,en], o:[[it,en],...]
const DOM_NAZIONE = {
  Italia:[
    {q:["Qual è la capitale d'Italia?","What is the capital of Italy?"],o:[["Roma","Rome"],["Milano","Milan"],["Napoli","Naples"],["Torino","Turin"]],a:0},
    {q:["Quale fiume attraversa Roma?","Which river flows through Rome?"],o:[["Il Tevere","The Tiber"],["Il Po","The Po"],["L'Arno","The Arno"],["L'Adige","The Adige"]],a:0},
    {q:["Vero o Falso: l'Italia fu tra i 6 paesi fondatori della CEE (1957).","True or False: Italy was one of the 6 founding countries of the EEC (1957)."],o:[["Vero","True"],["Falso","False"]],a:0},
    {q:["Quale città italiana è famosa per i canali e le gondole?","Which Italian city is famous for canals and gondolas?"],o:[["Venezia","Venice"],["Firenze","Florence"],["Genova","Genoa"],["Bari","Bari"]],a:0},
    {q:["Quale moneta si usava in Italia prima dell'euro?","Which currency was used in Italy before the euro?"],o:[["La Lira","The Lira"],["Il Fiorino","The Florin"],["La Peseta","The Peseta"],["Il Franco","The Franc"]],a:0},

/* ============================================================

   La partita si salva all'inizio di ogni turno; alla riapertura
   della pagina compare il pulsante "Riprendi la partita".
   ============================================================ */
function salvaPartita(){
  if(remoteMode) return;   // le partite a distanza non usano il salvataggio locale
  try{ localStorage.setItem("steSalvataggioBot3", JSON.stringify({players,turno,lang,botDiff})); }catch(e){}
}
function cancellaSalvataggio(){ try{ localStorage.removeItem("steSalvataggioBot3"); }catch(e){} }
function riprendiPartita(){
  try{
    const s=JSON.parse(localStorage.getItem("steSalvataggioBot3"));
    if(!s || !s.players || !s.players.length) throw 0;
    players=s.players; turno=s.turno||0; nGiocatori=players.length; lang=s.lang||'it';
    botDiff=s.botDiff||0.65;
    audio=document.getElementById("audioOn").checked;
    document.getElementById("setup").style.display="none";
    document.getElementById("gioco").style.display="block";
    applyLang(); aggiornaAudioBtn();
    log(()=>tr("💾 Partita ripresa dal salvataggio automatico.","💾 Game resumed from autosave."));
    iniziaTurno();
  }catch(e){
    cancellaSalvataggio();
    alert(tr("Il salvataggio non è valido: inizia una nuova partita.","The save is not valid: start a new game."));
  }
}

function nuovoContratto(){
  const merci=Object.keys(MERCI);
  const good=merci[Math.floor(Math.random()*merci.length)];
  // la destinazione non può essere una nazione che produce quella merce (niente consegne "gratis")
  const produttori=CELLE.filter(c=>c.goods&&c.goods.includes(good)).map(c=>c.n);
  const dests=NAZIONI.filter(n=>!produttori.includes(n));
  const dest=dests[Math.floor(Math.random()*dests.length)];
  return {good,dest};
}

/* ============================================================
   DISEGNO TABELLONE — serpentina: 6 file da 13 caselle grandi.
   L'ordine delle caselle è quello dell'array CELLE; la posizione
   sullo schermo è calcolata da cellXY(i).
   ============================================================ */
const COLS=13, CW=160, CH=120, PX=172, PY=210, MX=60, MY=56;
function cellXY(i){
  const row=Math.floor(i/COLS), k=i%COLS;
  const col=(row%2===0)?k:(COLS-1-k);          // le file dispari corrono da destra a sinistra
  const x=MX+col*PX, y=MY+row*PY;
  return {x,y,cx:x+CW/2,cy:y+CH/2,row,col};
}
// Bandierine disegnate in SVG (le emoji-bandiera non si vedono su Windows)
function flagSVG(n,x,y,w,h){

  else if(n==="Germania")s=`<rect x="${x}" y="${y}" width="${w}" height="${f}" fill="#000"/><rect x="${x}" y="${y+f}" width="${w}" height="${f}" fill="#DD0000"/><rect x="${x}" y="${y+2*f}" width="${w}" height="${f}" fill="#FFCE00"/>`;
  else if(n==="Austria") s=`<rect x="${x}" y="${y}" width="${w}" height="${f}" fill="#ED2939"/><rect x="${x}" y="${y+f}" width="${w}" height="${f}" fill="#fff"/><rect x="${x}" y="${y+2*f}" width="${w}" height="${f}" fill="#ED2939"/>`;

  else if(n==="Svizzera")s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#DA291C"/><rect x="${x+w/2-w*0.09}" y="${y+h*0.18}" width="${w*0.18}" height="${h*0.64}" fill="#fff"/><rect x="${x+w/2-w*0.22}" y="${y+h/2-h*0.11}" width="${w*0.44}" height="${h*0.22}" fill="#fff"/>`;
  else if(n==="Portogallo") s=`<rect x="${x}" y="${y}" width="${w*0.4}" height="${h}" fill="#046A38"/><rect x="${x+w*0.4}" y="${y}" width="${w*0.6}" height="${h}" fill="#DA291C"/><circle cx="${x+w*0.4}" cy="${y+h/2}" r="${h*0.22}" fill="#FFE900" stroke="#00000033" stroke-width="1"/>`;
  else if(n==="Paesi Bassi") s=`<rect x="${x}" y="${y}" width="${w}" height="${f}" fill="#AE1C28"/><rect x="${x}" y="${y+f}" width="${w}" height="${f}" fill="#fff"/><rect x="${x}" y="${y+2*f}" width="${w}" height="${f}" fill="#21468B"/>`;
  else if(n==="Polonia") s=`<rect x="${x}" y="${y}" width="${w}" height="${h/2}" fill="#fff"/><rect x="${x}" y="${y+h/2}" width="${w}" height="${h/2}" fill="#DC143C"/>`;
  else if(n==="Lituania") s=`<rect x="${x}" y="${y}" width="${w}" height="${f}" fill="#FDB913"/><rect x="${x}" y="${y+f}" width="${w}" height="${f}" fill="#006A44"/><rect x="${x}" y="${y+2*f}" width="${w}" height="${f}" fill="#C1272D"/>`;
  else if(n==="Lettonia") s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#9E3039"/><rect x="${x}" y="${y+h*0.4}" width="${w}" height="${h*0.2}" fill="#fff"/>`;
  else if(n==="Estonia") s=`<rect x="${x}" y="${y}" width="${w}" height="${f}" fill="#0072CE"/><rect x="${x}" y="${y+f}" width="${w}" height="${f}" fill="#000"/><rect x="${x}" y="${y+2*f}" width="${w}" height="${f}" fill="#fff"/>`;
  else if(n==="Danimarca") s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#C8102E"/><rect x="${x+w*0.28}" y="${y}" width="${w*0.13}" height="${h}" fill="#fff"/><rect x="${x}" y="${y+h*0.40}" width="${w}" height="${h*0.2}" fill="#fff"/>`;
  else if(n==="Norvegia") s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#BA0C2F"/><rect x="${x+w*0.25}" y="${y}" width="${w*0.19}" height="${h}" fill="#fff"/><rect x="${x}" y="${y+h*0.36}" width="${w}" height="${h*0.28}" fill="#fff"/><rect x="${x+w*0.30}" y="${y}" width="${w*0.09}" height="${h}" fill="#00205B"/><rect x="${x}" y="${y+h*0.43}" width="${w}" height="${h*0.14}" fill="#00205B"/>`;

function disegnaMappa(){
  const svg=document.getElementById("board");
  let s="";
  // sfondo
  s+=`<rect x="0" y="0" width="2344" height="1310" rx="18" fill="#dce9f8"/>`;
  // strada: passa per i centri delle caselle; l'ultima casella (in basso a sinistra)
  // ritorna alla partenza risalendo lungo il bordo sinistro
  const pts=[];
  for(let i=0;i<N;i++){const q=cellXY(i);pts.push(q.cx+","+q.cy);}
  const first=cellXY(0), last=cellXY(N-1);
  pts.push(`25,${last.cy}`,`25,${first.cy}`,`${first.cx},${first.cy}`);
  const ptStr=pts.join(" ");
  s+=`<polyline points="${ptStr}" fill="none" stroke="#8a93a5" stroke-width="30" stroke-linejoin="round" stroke-linecap="round"/>`;
  s+=`<polyline points="${ptStr}" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="14 16" stroke-linejoin="round" stroke-linecap="round" opacity=".9"/>`;
  // frecce sulla strada di ritorno (si risale verso la casella 1)
  [0.25,0.50,0.75].forEach(f=>{
    const ay=last.cy-(last.cy-first.cy)*f;
    s+=`<polygon points="25,${ay-12} 37,${ay+9} 13,${ay+9}" fill="#fff" opacity=".95"/>`;
  });
  // caselle
  const destEvid=(players.length && cur().contratto) ? cur().contratto.dest : null;
  CELLE.forEach((c,i)=>{
    const q=cellXY(i);
    let col="#ffffff", stroke="#003399", txt="#1a1a2e";
    if(c.t==="frontier"){col="#FFCC00";stroke="#b58a00";}
    else if(c.t==="blue"){col="#2E77D0";stroke="#13407a";txt="#fff";}
    else if(c.t==="arena"){col="#C0392B";stroke="#7d1f15";txt="#fff";}
    else if(c.t==="pickup"){col="#1f8a3b";stroke="#0f5a23";txt="#fff";}
    s+=`<g>`;
    // evidenzia la nazione dove il giocatore di turno deve consegnare
    if(destEvid && c.n===destEvid){
      s+=`<rect x="${q.x-7}" y="${q.y-7}" width="${CW+14}" height="${CH+14}" rx="18" fill="none" stroke="${players[turno].col}" stroke-width="5" stroke-dasharray="10 7">
            <animate attributeName="opacity" values="1;.25;1" dur="1.4s" repeatCount="indefinite"/>
          </rect>`;
    }
    s+=`<rect x="${q.x}" y="${q.y}" width="${CW}" height="${CH}" rx="14" fill="${col}" stroke="${stroke}" stroke-width="4"/>`;
    // numero progressivo: rende evidente l'ordine del percorso
    s+=`<circle cx="${q.x+21}" cy="${q.y+21}" r="14" fill="#fff" stroke="${stroke}" stroke-width="2.5"/>`;
    s+=`<text x="${q.x+21}" y="${q.y+26}" text-anchor="middle" font-size="15" font-weight="800" fill="#1a1a2e">${i+1}</text>`;
    // bandierina della nazione
    s+=flagSVG(c.n, q.x+CW-50, q.y+8, 42, 27);
    // merci prelevabili
    if(c.goods) s+=`<text x="${q.x+CW/2-8}" y="${q.y+29}" text-anchor="middle" font-size="19">${c.goods.map(g=>MERCI[g]).join("")}</text>`;
    // icona + nome
    let ico="";
    if(c.t==="frontier")ico="🛂 "; else if(c.t==="blue")ico="🔵 "; else if(c.t==="arena")ico="⭐ "; else if(c.t==="pickup")ico="📦 ";
    const nome=(c.t==="frontier")?tr("Frontiera","Border"):citta(c.city);
    const fs=(ico+nome).length>12?19:23;
    s+=`<text x="${q.cx}" y="${q.y+68}" text-anchor="middle" font-size="${fs}" font-weight="800" fill="${txt}">${ico}${nome}</text>`;
    // nazione (per le frontiere: verso quale paese si entra)
    const sotto=(c.t==="frontier")?("→ "+naz(c.n)):naz(c.n);
    s+=`<text x="${q.cx}" y="${q.y+96}" text-anchor="middle" font-size="16" font-style="italic" fill="${txt}" opacity=".85">${sotto}</text>`;
    s+=`</g>`;
  });
  // pedine (camioncini) — nello spazio sotto la casella; il giocatore di turno sta sopra
  const ordine=[...players.keys()].sort((a,b)=>(a===turno?1:0)-(b===turno?1:0));
  ordine.forEach((pi)=>{
    const p=players[pi];
    const q=cellXY(p.pos);
    const samecell=players.filter(z=>z.pos===p.pos);
    const idx=samecell.indexOf(p);
    // griglia compatta: max 3 camion per fila, così la partenza resta leggibile
    const row=Math.floor(idx/3), col=idx%3;
    const inRow=Math.min(3, samecell.length-row*3);
    const off=(col-(inRow-1)/2)*30;
    const x=q.cx+off, y=q.y+CH+22+row*26;
    const attivo=(pi===turno);
    s+=`<g>`;
    if(attivo){
      // alone pulsante attorno al camion di turno
      s+=`<circle cx="${x}" cy="${y}" r="21" fill="none" stroke="${p.col}" stroke-width="5" opacity=".95">
            <animate attributeName="r" values="19;34;19" dur="1.3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values=".95;0;.95" dur="1.3s" repeatCount="indefinite"/>
          </circle>`;
    }
    const r=attivo?22:13;
    s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${p.col}" stroke="#fff" stroke-width="${attivo?4:2.5}"/>`;
    s+=`<text x="${x}" y="${y+(attivo?7:5)}" text-anchor="middle" font-size="${attivo?26:15}">🚚</text>`;
    if(attivo){
      // freccia "SEI QUI" che rimbalza sopra il camion
      s+=`<g><polygon points="${x-14},${y-38} ${x+14},${y-38} ${x},${y-18}" fill="${p.col}" stroke="#fff" stroke-width="2.5">
            <animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" dur="0.85s" repeatCount="indefinite"/>
          </polygon></g>`;
      // etichetta col nome SOLO per il giocatore di turno (gli altri nomi sono in classifica)
      const lbl=p.nome;
      const w=Math.max(46,lbl.length*10+16);
      const ly=y+26;
      s+=`<rect x="${x-w/2}" y="${ly}" width="${w}" height="24" rx="10" fill="#fff" stroke="${p.col}" stroke-width="2.5"/>`;
      s+=`<text x="${x}" y="${ly+17}" text-anchor="middle" class="truck-label" fill="${p.col}" font-weight="800" font-size="15">${lbl}</text>`;
    }
    s+=`</g>`;
  });
  svg.innerHTML=s;
}

/* ============================================================
   TURNI
   ============================================================ */
function cur(){return players[turno];}

function iniziaTurno(){
  ctx={};
  salvaPartita();
  const p=cur();
  document.getElementById("dadoView").textContent="–";
  document.getElementById("actions").innerHTML="";
  bannerTurno();
  renderGiocatore(); renderScore(); disegnaMappa();
  vista('pan');   // a inizio turno si agisce dal pannello (dado)

  if(p.skip){
    p.skip=false;
    log(()=>tr(`⏭️ ${p.nome} salta il turno.`,`⏭️ ${p.nome} misses a turn.`));
    document.getElementById("btnDado").disabled=true;
    setTimeout(prossimoTurno,1100);
    return;
  }
  bloccaDado=false;
  document.getElementById("btnDado").disabled=false;
  // se tocca a un giocatore lontano, l'host non può tirare per lui
  // (il suo clic arriva via rete e chiama tiraDado direttamente)
  if(isHost && p.peer) document.getElementById("btnDado").disabled=true;
  // il computer tira il dado da solo
  if(p.bot){
    document.getElementById("btnDado").disabled=true;
    setTimeout(()=>{ if(!partitaFinita && players[turno]===p && !bloccaDado) tiraDado(); },1400);
  }
}

function prossimoTurno(){
  turno=(turno+1)%players.length;
  iniziaTurno();
}

function tiraDado(){
  if(bloccaDado)return;
  bloccaDado=true;
  document.getElementById("btnDado").disabled=true;
  beep(660,.08);
  // animazione
  let n=0,giri=0;
  const dv=document.getElementById("dadoView");
  const anim=setInterval(()=>{
    n=1+Math.floor(Math.random()*6); dv.textContent=n; giri++;
    if(giri>8){clearInterval(anim); risolviMovimento(n);}
  },70);
}

function risolviMovimento(d){
  const p=cur();
  ctx.roll=d;
  log(()=>tr(`🎲 ${p.nome} tira un ${d}.`,`🎲 ${p.nome} rolls a ${d}.`));
  vista('tab');   // durante il movimento si guarda il tabellone a tutto schermo
  // cerca prima frontiera nel percorso
  let frontIdx=-1, passi=0;
  for(let s=1;s<=d;s++){
    const idx=(p.pos+s)%N;
    if(CELLE[idx].t==="frontier"){frontIdx=idx;passi=s;break;}
  }
  if(frontIdx>=0){
    const resto=d-passi;
    muoviAnimato(p,passi,()=>{
      log(()=>tr(`🛂 ${p.nome} arriva alla frontiera con ${naz(CELLE[frontIdx].n)}.`,`🛂 ${p.nome} reaches the border with ${naz(CELLE[frontIdx].n)}.`));
      setTimeout(()=>dadoDoganale(resto),500);
    });
  }else{
    muoviAnimato(p,d,()=>arrivo());
  }
}

function muoviSemplice(p,k){ p.pos=(p.pos+k)%N; }

// Movimento animato: il camioncino avanza una casella alla volta
function muoviAnimato(p,k,fine){
  if(k<=0){ disegnaMappa(); fine(); return; }
  let fatti=0;
  const step=()=>{
    p.pos=(p.pos+1)%N; fatti++;
    disegnaMappa(); beep(560,.05);
    if(fatti<k) setTimeout(step,270); else setTimeout(fine,380);
  };
  step();
}

function dadoDoganale(resto){
  const p=cur();
  beep(520,.08);
  const c=1+Math.floor(Math.random()*6);
  log(()=>tr(`🛃 Dado Doganale: ${c}.`,`🛃 Customs Die: ${c}.`));
  if(c<=4){
    domandaDogana(resto);
  }else if(c===5){
    log(()=>tr(`🟦 Schengen! ${p.nome} passa libero e RADDOPPIA il movimento residuo.`,`🟦 Schengen! ${p.nome} passes free and DOUBLES the remaining move.`));
    continuaDopoFrontiera(resto,2);
  }else{
    p.jolly++;
    log(()=>tr(`🃏 Jolly! ${p.nome} passa libero e ottiene un Jolly.`,`🃏 Joker! ${p.nome} passes free and gets a Joker.`));
    continuaDopoFrontiera(resto,1);
  }
}

// Mostra la domanda di dogana
function domandaDogana(resto){
  const p=cur();
  // il computer, se ha un Jolly, lo usa per passare senza rispondere
  if(p.bot && p.jolly>0){ usaJollyDogana(resto); return; }
  const nazi=CELLE[p.pos].n;
  const qRaw=pickDomandaNazione(nazi);
  ctx.qCorrente=qRaw.q[0];
  const q=locQ(qRaw);
  let extra="";
  if(p.jolly>0){
    extra=`<div class="opzioni" style="margin-top:8px;">
      <button class="oro" onclick="usaJollyDogana(${resto})">${tr("🃏 Usa Jolly: passa senza domanda","🃏 Use Joker: pass without question")}</button>
    </div>`;
  }
  mostraDomanda(tr(`🛂 Dogana — ${naz(nazi)}`,`🛂 Customs — ${naz(nazi)}`), q, (ok)=>{
    if(ok){ p.cultura+=5; log(()=>tr(`✅ Risposta esatta! ${p.nome} passa la frontiera (+5 Cultura).`,`✅ Correct! ${p.nome} crosses the border (+5 Culture).`)); continuaDopoFrontiera(resto,1); }
    else { log(()=>tr(`❌ Risposta errata: ${p.nome} resta fermo e salta il prossimo turno.`,`❌ Wrong: ${p.nome} stays put and misses the next turn.`)); p.skip=true; chiudiModaleEArrivo(); }
  }, extra, p);
}

function usaJollyDogana(resto){
  const p=cur(); p.jolly--;
  log(()=>tr(`🃏 ${p.nome} usa un Jolly e supera la dogana senza rispondere.`,`🃏 ${p.nome} uses a Joker and passes customs without answering.`));
  chiudiModale();
  continuaDopoFrontiera(resto,1);
}

function continuaDopoFrontiera(resto,molt){
  chiudiModale();
  const p=cur();
  muoviAnimato(p,resto*molt,()=>arrivo());
}

function chiudiModaleEArrivo(){ chiudiModale(); disegnaMappa(); setTimeout(()=>arrivo(),300); }

/* ---- ARRIVO sulla casella finale ---- */
function arrivo(){
  const p=cur();
  const c=CELLE[p.pos];
  // Il Momento: 6 col dado oppure casella Arena
  if(ctx.roll===6 || c.t==="arena"){
    log(()=>tr(`⭐ IL MOMENTO! (${p.nome}: ${c.t==="arena"?"sei sull'Arena":"hai fatto 6"}) Quiz per tutti i giocatori!`,`⭐ THE MOMENT! (${p.nome}: ${c.t==="arena"?"you are on the Arena":"you rolled a 6"}) Quiz for all players!`));
    ilMomento(()=>pannelloAzioni());
  }else{
    pannelloAzioni();
  }
}

/* ---- IL MOMENTO: quiz collettivo, tutti rispondono a turno ---- */
function ilMomento(fine){
  const ordine=players.map((_,i)=>(turno+i)%players.length);
  let vincitore=null, k=0;
  function next(){
    if(k>=ordine.length){
      if(vincitore!==null){
        players[vincitore].jolly++;
        log(()=>tr(`🏅 ${players[vincitore].nome} vince Il Momento e ottiene un Jolly!`,`🏅 ${players[vincitore].nome} wins The Moment and gets a Joker!`));
      }else{
        log(()=>tr("😕 Nessuno indovina Il Momento: niente Jolly.","😕 Nobody guesses The Moment: no Joker."));
      }
      chiudiModale(); renderGiocatore(); renderScore(); fine(); return;
    }
    const pi=ordine[k], pl=players[pi];
    const q=locQ(pickFromPool(DOM_GENERALI));
    mostraDomanda(tr(`⭐ IL MOMENTO — Risponde: ${pl.nome}`,`⭐ THE MOMENT — Answering: ${pl.nome}`), q, (ok)=>{
      if(ok){
        pl.cultura+=5;
        if(vincitore===null) vincitore=pi;
        log(()=>tr(`✅ ${pl.nome} indovina! +5 Cultura.`,`✅ ${pl.nome} guesses right! +5 Culture.`));
      }else{
        log(()=>tr(`❌ ${pl.nome} non indovina.`,`❌ ${pl.nome} misses.`));
      }
      k++; next();
    }, "", pl);
  }
  next();
}

/* ---- PANNELLO AZIONI sulla casella ---- */
function pannelloAzioni(){
  const p=cur();
  const c=CELLE[p.pos];
  const div=document.getElementById("actions");
  let html="";

  // Bonus casella blu (una volta per arrivo)
  if(c.t==="blue" && !ctx.blueDone){
    ctx.blueDone=true;
    p.integrazione+=3;
    log(()=>tr(`🔵 ${p.nome} è in una Zona di Libero Scambio (${citta(c.city)}): +3 Integrazione.`,`🔵 ${p.nome} is in a Free Trade Zone (${citta(c.city)}): +3 Integration.`));
  }

  // Prelievo merci (con limite di carico)
  if(c.goods){
    if(p.inv.length>=MAX_CARICO){
      html+=`<div style="font-weight:600;">${tr(`🚛 Camion pieno (${MAX_CARICO} merci): non puoi caricare altro.`,`🚛 Truck full (${MAX_CARICO} goods): you can't load more.`)}</div>`;
    }else{
      c.goods.forEach(g=>{
        if(!p.inv.includes(g)){
          html+=`<button class="verde" onclick="preleva('${g}')">${tr("📦 Preleva","📦 Pick up")} ${MERCI[g]} ${merce(g)}</button>`;
        }
      });
    }
  }
  // Merce gratis nelle caselle blu
  if(c.t==="blue" && !ctx.blueGood && p.inv.length<MAX_CARICO){
    html+=`<div style="font-weight:600;margin-top:4px;">${tr("🎁 Scegli una merce gratis:","🎁 Choose a free good:")}</div>`;
    Object.keys(MERCI).forEach(g=>{
      if(!p.inv.includes(g)) html+=`<button class="ghost" onclick="preleva('${g}',true)">${MERCI[g]} ${merce(g)}</button>`;
    });
  }
  // Scambio merci nelle Zone di Libero Scambio (se c'è un altro giocatore sulla casella)
  if(c.t==="blue" && !ctx.scambioDone){
    players.forEach((o,oi)=>{
      if(oi!==turno && o.pos===p.pos){
        const dai=p.inv.filter(g=>!o.inv.includes(g));
        const prendi=o.inv.filter(g=>!p.inv.includes(g));
        if(dai.length && prendi.length){
          html+=`<button class="ghost" onclick="apriScambio(${oi})">${tr(`🔄 Scambia una merce con ${o.nome}`,`🔄 Exchange a good with ${o.nome}`)}</button>`;
        }
      }
    });
  }
  // Jolly: ruba una merce a un avversario (se c'è posto sul camion)
  if(p.jolly>0 && !ctx.rubaDone && p.inv.length<MAX_CARICO){
    const rubabili=players.some((o,oi)=>oi!==turno && o.inv.some(g=>!p.inv.includes(g)));
    if(rubabili) html+=`<button class="ghost" onclick="apriRuba()">${tr("🃏 Usa Jolly: ruba una merce","🃏 Use Joker: steal a good")}</button>`;
  }
  // Consegna contratto
  if(p.contratto && c.n===p.contratto.dest && p.inv.includes(p.contratto.good)){
    html+=`<button class="oro" onclick="consegna()" style="font-size:1.1rem;">${tr(`✅ CONSEGNA il contratto a ${naz(c.n)}!`,`✅ DELIVER the contract to ${naz(c.n)}!`)}</button>`;
  }

  html+=`<button class="rosso" onclick="terminaTurno()" style="margin-top:6px;">${tr("➡️ Termina il turno","➡️ End turn")}</button>`;
  div.innerHTML=html;
  renderGiocatore(); renderScore();
  vista('pan');   // arrivato sulla casella: si agisce dal pannello
  // il computer decide da solo (i pulsanti restano visibili ma non cliccabili)
  if(p.bot){ div.style.pointerEvents="none"; setTimeout(botAzioni,1100); }
  else if(isHost && p.peer){ div.style.pointerEvents="none"; }  // agisce l'ospite lontano, non l'host
  else div.style.pointerEvents="auto";
}

/* ---- Turno automatico del computer ----
   Ogni azione richiama pannelloAzioni, che riprogramma botAzioni:
   le condizioni via via si esauriscono e si arriva a terminaTurno. */
function botAzioni(){
  if(partitaFinita) return;
  const p=cur();
  if(!p || !p.bot) return;
  const c=CELLE[p.pos];
  // 1) consegna il contratto se possibile
  if(p.contratto && c.n===p.contratto.dest && p.inv.includes(p.contratto.good)){ consegna(); return; }
  // 2) preleva la merce del contratto se è prodotta qui
  if(c.goods && p.contratto && c.goods.includes(p.contratto.good) && !p.inv.includes(p.contratto.good) && p.inv.length<MAX_CARICO){ preleva(p.contratto.good); return; }
  // 3) merce gratis nelle caselle blu: quella del contratto, altrimenti una che non ha
  if(c.t==="blue" && !ctx.blueGood && p.inv.length<MAX_CARICO){
    const g=(p.contratto && !p.inv.includes(p.contratto.good)) ? p.contratto.good : Object.keys(MERCI).find(x=>!p.inv.includes(x));
    if(g){ preleva(g,true); return; }
  }
  // 4) fine del turno
  terminaTurno();
}

/* ---- Scambio merci (caselle blu, con un altro giocatore presente) ---- */
function apriScambio(oi){
  const p=cur(), o=players[oi];
  const m=document.getElementById("modal");
  let html=`<h2>${tr("🔄 Scambio merci","🔄 Goods exchange")}</h2>
    <p style="font-size:1.15rem;">${tr(`Quale merce dai a <b>${o.nome}</b>?`,`Which good do you give to <b>${o.nome}</b>?`)}</p><div class="opzioni">`;
  p.inv.filter(g=>!o.inv.includes(g)).forEach(g=>{
    html+=`<button onclick="scambioDai(${oi},'${g}')">${MERCI[g]} ${merce(g)}</button>`;
  });
  html+=`</div><div class="opzioni"><button class="rosso" onclick="chiudiModale()">${tr("Annulla","Cancel")}</button></div>`;
  m.innerHTML=html; document.getElementById("overlay").style.display="flex";
}
function scambioDai(oi,gDai){
  const p=cur(), o=players[oi];
  const m=document.getElementById("modal");
  let html=`<h2>${tr("🔄 Scambio merci","🔄 Goods exchange")}</h2>
    <p style="font-size:1.15rem;">${tr(`Dai ${MERCI[gDai]} ${merce(gDai)}. Quale merce prendi da <b>${o.nome}</b>?`,`You give ${MERCI[gDai]} ${merce(gDai)}. Which good do you take from <b>${o.nome}</b>?`)}</p><div class="opzioni">`;
  o.inv.filter(g=>!p.inv.includes(g)).forEach(g=>{
    html+=`<button onclick="scambioRicevi(${oi},'${gDai}','${g}')">${MERCI[g]} ${merce(g)}</button>`;
  });
  html+=`</div><div class="opzioni"><button class="rosso" onclick="chiudiModale()">${tr("Annulla","Cancel")}</button></div>`;
  m.innerHTML=html; document.getElementById("overlay").style.display="flex";
}
function scambioRicevi(oi,gDai,gRic){
  const p=cur(), o=players[oi];
  p.inv.splice(p.inv.indexOf(gDai),1); o.inv.push(gDai);
  o.inv.splice(o.inv.indexOf(gRic),1); p.inv.push(gRic);
  ctx.scambioDone=true;
  log(()=>tr(`🔄 ${p.nome} scambia ${MERCI[gDai]} ${merce(gDai)} con ${MERCI[gRic]} ${merce(gRic)} di ${o.nome}.`,`🔄 ${p.nome} trades ${MERCI[gDai]} ${merce(gDai)} for ${o.nome}'s ${MERCI[gRic]} ${merce(gRic)}.`));
  beep(720,.08); setTimeout(()=>beep(900,.08),90);
  chiudiModale(); pannelloAzioni();
}

/* ---- Jolly: ruba una merce a un avversario ---- */
function apriRuba(){
  const p=cur();
  const m=document.getElementById("modal");
  let html=`<h2>${tr("🃏 Ruba una merce","🃏 Steal a good")}</h2>
    <p style="font-size:1.15rem;">${tr("Scegli la merce da rubare (costa 1 Jolly):","Choose the good to steal (costs 1 Joker):")}</p><div class="opzioni">`;
  players.forEach((o,oi)=>{
    if(oi!==turno) o.inv.filter(g=>!p.inv.includes(g)).forEach(g=>{
      html+=`<button onclick="rubaMerce(${oi},'${g}')">${MERCI[g]} ${merce(g)} — ${o.nome}</button>`;
    });
  });
  html+=`</div><div class="opzioni"><button class="rosso" onclick="chiudiModale()">${tr("Annulla","Cancel")}</button></div>`;
  m.innerHTML=html; document.getElementById("overlay").style.display="flex";
}
function rubaMerce(oi,g){
  const p=cur(), o=players[oi];
  p.jolly--;
  o.inv.splice(o.inv.indexOf(g),1); p.inv.push(g);
  ctx.rubaDone=true;
  log(()=>tr(`🃏 ${p.nome} usa un Jolly e ruba ${MERCI[g]} ${merce(g)} a ${o.nome}!`,`🃏 ${p.nome} uses a Joker and steals ${MERCI[g]} ${merce(g)} from ${o.nome}!`));
  beep(300,.15); setTimeout(()=>beep(600,.12),150);
  chiudiModale(); pannelloAzioni();
}

function preleva(g,gratis){
  const p=cur();
  if(p.inv.length>=MAX_CARICO) return;
  if(!p.inv.includes(g)) p.inv.push(g);
  log(()=>tr(`📦 ${p.nome} carica ${MERCI[g]} ${merce(g)}${gratis?" (gratis)":""}.`,`📦 ${p.nome} loads ${MERCI[g]} ${merce(g)}${gratis?" (free)":""}.`));
  beep(720,.06);
  if(gratis) ctx.blueGood=true;
  pannelloAzioni();
}

function consegna(){
  const p=cur();
  const g=p.contratto.good;
  p.inv.splice(p.inv.indexOf(g),1);
  p.integrazione+=10; p.fatti++;
  log(()=>tr(`🎉 ${p.nome} consegna ${MERCI[g]} ${merce(g)} a ${naz(p.contratto.dest)}! Contratto ${p.fatti}/3 completato (+10 Integrazione).`,`🎉 ${p.nome} delivers ${MERCI[g]} ${merce(g)} to ${naz(p.contratto.dest)}! Contract ${p.fatti}/3 completed (+10 Integration).`));
  beep(880,.12); setTimeout(()=>beep(1100,.12),120);
  if(p.fatti>=3){
    pannelloAzioni();
    setTimeout(finePartita,400);
    return;
  }
  p.contratto=null;
  renderGiocatore();
  scegliContratto();
}

/* ---- Scelta del nuovo contratto tra due proposte ---- */
function scegliContratto(){
  const a=nuovoContratto();
  let b=nuovoContratto(), tent=0;
  while(b.good===a.good && b.dest===a.dest && tent++<10) b=nuovoContratto();
  ctx.proposte=[a,b];
  const btn=x=>{
    const c=ctx.proposte[x];
    return `<button onclick="setContratto(${x})">${tr("Porta","Deliver")} ${MERCI[c.good]} ${merce(c.good)} → <b>${naz(c.dest)}</b></button>`;
  };
  document.getElementById("modal").innerHTML=`
    <h2>📝 ${tr("Scegli il prossimo contratto","Choose your next contract")}</h2>
    <p style="font-size:1.15rem;">${tr("Quale trasporto accetti?","Which delivery do you accept?")}</p>
    <div class="opzioni">${btn(0)}${btn(1)}</div>`;
  document.getElementById("overlay").style.display="flex";
  // se sceglie un ospite lontano, l'host non può cliccare per lui
  if(isHost && cur().peer){ document.querySelector("#modal .opzioni").style.pointerEvents="none"; }
  // il computer sceglie da solo: preferisce la merce che ha già a bordo
  if(cur().bot){
    document.querySelector("#modal .opzioni").style.pointerEvents="none";
    setTimeout(()=>{
      if(partitaFinita || !ctx.proposte) return;
      const p=cur();
      const i=p.inv.includes(ctx.proposte[0].good)?0:(p.inv.includes(ctx.proposte[1].good)?1:Math.floor(Math.random()*2));
      setContratto(i);
    },1600);
  }
}
function setContratto(i){
  const p=cur();
  p.contratto=ctx.proposte[i];
  log(()=>tr(`📝 ${p.nome} sceglie il contratto: porta ${MERCI[p.contratto.good]} ${merce(p.contratto.good)} a ${naz(p.contratto.dest)}.`,`📝 ${p.nome} picks the contract: deliver ${MERCI[p.contratto.good]} ${merce(p.contratto.good)} to ${naz(p.contratto.dest)}.`));
  chiudiModale();
  disegnaMappa(); // aggiorna l'evidenziazione della destinazione
  pannelloAzioni();
}

function terminaTurno(){
  document.getElementById("actions").innerHTML="";
  const p=cur();
  // Imprevisto casuale (non dopo l'Arena per non appesantire)
  if(Math.random()<0.18){
    const imp=IMPREVISTI[Math.floor(Math.random()*IMPREVISTI.length)];
    mostraImprevisto(imp);
    return;
  }
  finalizzaTurno();
}

function finalizzaTurno(){
  // controllo vittoria
  if(players.some(p=>p.fatti>=3)){ finePartita(); return; }
  disegnaMappa();
  prossimoTurno();
}

/* ============================================================
   FINE PARTITA
   ============================================================ */
function finePartita(){
  partitaFinita=true;
  cancellaSalvataggio();
  // punteggio: Integrazione (contratti) + Cultura; a parità vince chi ha più contratti
  const cls=[...players].sort((a,b)=>(b.integrazione+b.cultura)-(a.integrazione+a.cultura) || b.fatti-a.fatti);

let qTimer=null;
function mostraDomanda(titolo,q,cb,extraHtml,rispondente){
  clearInterval(qTimer);
  rispCorrente=rispondente||null;   // per i permessi del gioco a distanza
  const SECS=30; // cronometro della prova (come da regolamento)
  const ov=document.getElementById("overlay");
  const m=document.getElementById("modal");
  let html=`<h2>${titolo}</h2><p style="font-size:1.2rem;font-weight:600;">${q.q}</p><div class="opzioni">`;
  q.o.forEach((op,i)=>{ html+=`<button data-i="${i}">${op}</button>`; });
  html+=`</div>${extraHtml||""}
    <div class="tmr"><span>⏱</span><div class="barra"><div id="tmrBar"></div></div><span class="sec" id="tmrSec">${SECS}s</span></div>
    <div class="feedback" id="fb"></div>`;
  m.innerHTML=html; ov.style.display="flex";
  function chiudi(ok, daTimeout){
    clearInterval(qTimer);
    m.querySelectorAll(".opzioni button").forEach(x=>x.disabled=true);
    if(!ok) m.querySelectorAll(".opzioni button[data-i]")[q.a].classList.add("giusta");
    document.getElementById("fb").textContent = ok ? tr("✅ Esatto!","✅ Correct!")
      : daTimeout ? tr("⏱ Tempo scaduto! La risposta giusta è evidenziata.","⏱ Time's up! The correct answer is highlighted.")
      : tr("❌ Sbagliato. La risposta giusta è evidenziata.","❌ Wrong. The correct answer is highlighted.");
    if(ok){beep(880,.1);setTimeout(()=>beep(1100,.1),110);} else beep(180,.25);
    setTimeout(()=>cb(ok), ok?700:1500);
  }
  let t=SECS;
  qTimer=setInterval(()=>{
    t--;
    const bar=document.getElementById("tmrBar"), sec=document.getElementById("tmrSec");
    if(!bar){ clearInterval(qTimer); return; }
    bar.style.width=(t/SECS*100)+"%";
    if(t<=10) bar.style.background="var(--rosso)";
    sec.textContent=t+"s";
    if(t===10) beep(440,.1);
    if(t<=0) chiudi(false,true);
  },1000);
  m.querySelectorAll(".opzioni button[data-i]").forEach(b=>{
    b.onclick=()=>{
      const ok=(+b.dataset.i===q.a);
      b.classList.add(ok?"giusta":"sbagliata");
      chiudi(ok,false);
    };
  });
  // se risponde un ospite lontano, l'host non può cliccare per lui
  if(isHost && rispondente && rispondente.peer){
    m.querySelectorAll(".opzioni").forEach(d=>d.style.pointerEvents="none");
  }
  // risposta automatica del computer (il pubblico guarda, i clic sono disattivati)
  if(rispondente && rispondente.bot){
    m.querySelectorAll(".opzioni").forEach(d=>d.style.pointerEvents="none");
    setTimeout(()=>{
      const bs=m.querySelectorAll(".opzioni button[data-i]");
      if(!bs.length || bs[0].disabled) return;   // già risposto o modale cambiata
      let i=q.a;
      if(Math.random()>=botDiff){ do{ i=Math.floor(Math.random()*q.o.length); }while(i===q.a && q.o.length>1); }
      bs[i].onclick();
    },2300);
  }
}

/* Le domande non si ripetono finché il mazzo non è esaurito */
const domandeUsate=new Set();
function pickFromPool(arr){
  let fresche=arr.filter(q=>!domandeUsate.has(q.q[0]));
  if(!fresche.length){ arr.forEach(q=>domandeUsate.delete(q.q[0])); fresche=arr; } // mazzo esaurito: si rimescola
  const q=fresche[Math.floor(Math.random()*fresche.length)];
  domandeUsate.add(q.q[0]);
  return q;
}
function pickDomandaNazione(naz){
  return pickFromPool(DOM_NAZIONE[naz]||DOM_GENERALI);
}

let actx=null;
function beep(freq,dur){
  if(!audio)return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=freq; o.type="sine";
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(.18,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
// Sigla: "Inno alla Gioia" di Beethoven (inno europeo)
function jingle(){
  if(!audio)return;
  const E=330,F=349,G=392,D=294,C=262;
  const note=[[E,1],[E,1],[F,1],[G,1],[G,1],[F,1],[E,1],[D,1],[C,1],[C,1],[D,1],[E,1],[E,1.5],[D,.5],[D,2]];
  let t=0;
  note.forEach(([f,d])=>{ setTimeout(()=>beep(f,d*.22),t); t+=d*235; });
}
function toggleAudio(){ audio=!audio; aggiornaAudioBtn(); if(audio)beep(660,.1); }
function aggiornaAudioBtn(){ document.getElementById("btnAudio").textContent=audio?"🔊":"🔇"; }

/* ============================================================
   GIOCO A DISTANZA (PeerJS, senza registrazioni)
   L'organizzatore (host) esegue tutta la partita sul suo browser;
   gli ospiti ricevono uno "specchio" dello schermo e i loro clic
   viaggiano verso l'host, che li esegue solo se tocca a loro.
   ============================================================ */
const REGIONI_MIRROR=['turnoBanner','dadoView','actions','cardGiocatore','scoreboard','log','boardBar','board','modal'];
let remNomeVal="";

function caricaPeerJS(cb){
  if(window.Peer) return cb();
  const s=document.createElement('script');
  s.src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js";
  s.onload=cb;
  s.onerror=()=>alert(tr("Non riesco a caricare il modulo di collegamento: controlla la connessione a Internet.","Cannot load the connection module: check your Internet connection."));
  document.head.appendChild(s);
}

function renderLobbyHost(){

}
function hostSetupConn(conn){
  conn.on('data',d=>{
    if(!d||typeof d!=='object') return;
    if(d.t==='join'){
      const nome=String(d.nome||'').slice(0,14).trim()||tr('Ospite','Guest');
      if(remStarted){
        // rientro di un giocatore caduto: lo riconosciamo dal nome
        const p=players.find(x=>x.peer && x.nome===nome);
        if(p){ p.peer=conn.peer; if(!conns.includes(conn)) conns.push(conn); sendFullTo(conn); log(()=>tr(`🔌 ${nome} si è ricollegato.`,`🔌 ${nome} reconnected.`)); }
        else{ try{conn.send({t:'no', msg:tr("La partita è già iniziata.","The game has already started.")});}catch(e){} }
        return;
      }
      if(lobbyGuests.length>=4){ try{conn.send({t:'no', msg:tr("La partita è al completo.","The game is full.")});}catch(e){} return; }
      let n=nome,k=2;
      while(n===hostNome() || lobbyGuests.some(g=>g.nome===n)) n=nome+" "+(k++);
      lobbyGuests.push({connId:conn.peer, nome:n});
      if(!conns.includes(conn)) conns.push(conn);
      broadcastLobby(); renderLobbyHost();
    }
    else if(d.t==='click'){ eseguiClickRemoto(conn.peer,d); }
  });
  conn.on('close',()=>{
    conns=conns.filter(c=>c!==conn);
    if(!remStarted){
      lobbyGuests=lobbyGuests.filter(g=>g.connId!==conn.peer);
      broadcastLobby(); renderLobbyHost();
    }else{
      const p=players.find(x=>x.peer===conn.peer);
      if(p) log(()=>tr(`⚠️ ${p.nome} ha perso il collegamento: può rientrare aprendo la pagina e usando lo stesso nome e il codice ${remCode}.`,`⚠️ ${p.nome} lost the connection: they can rejoin with the same name and code ${remCode}.`));
    }
  });
}
function broadcastLobby(){ broadcast({t:'lobby', nomi:[hostNome(),...lobbyGuests.map(g=>g.nome)]}); }
function broadcast(m){ conns.forEach(c=>{ try{ if(c.open) c.send(m); }catch(e){} }); }

function remoteStart(){
  if(!lobbyGuests.length || remStarted) return;
  audio=document.getElementById("audioOn").checked;
  players=[{nome:hostNome(), col:COLORI[0], pos:0, inv:[], contratto:nuovoContratto(), fatti:0, integrazione:0, cultura:0, jolly:0, skip:false}];

  }
  nGiocatori=players.length;
  remStarted=true;
  broadcast({t:'start', lang});

  document.getElementById("gioco").style.display="block";

  jingle();
  iniziaTurno();
}

    });
  });

function guestOnData(d){
  if(!d||typeof d!=='object') return;
  if(d.t==='lobby'){
    const st=document.getElementById('remStato');
    if(st) st.innerHTML=tr("✅ Sei dentro! In attesa che l'organizzatore avvii la partita…","✅ You're in! Waiting for the organizer to start…")+"<br><b>"+tr("Giocatori:","Players:")+"</b> "+d.nomi.join(" · ");

  else if(d.t==='no'){
    const st=document.getElementById('remStato'); if(st) st.innerHTML="❌ "+d.msg;
    try{myConn.close();}catch(e){}
  }
  else if(d.t==='start'){

    lang=d.lang||'it'; applyLang();
    document.getElementById('setup').style.display='none';
    document.getElementById('gioco').style.display='block';
    document.getElementById('btnNuova').style.display='none';

    vista('pan');

  else if(d.t==='m'){ applyMirror(d); }
}

/* ---- Specchio dello schermo: host → ospiti ---- */
function metaMirror(){
  const tb=document.getElementById('turnoBanner');
  return {
    ov:document.getElementById('overlay').style.display||'none',
    vi:vistaCorrente, lg:lang,
    bc:tb?tb.style.borderColor:'',
    tp:(players.length?(players[turno].peer||''):''),
    bl:bloccaDado
  };
}
function sendFullTo(conn){
  const r={};
  REGIONI_MIRROR.forEach(id=>{ const el=document.getElementById(id); r[id]=el?el.innerHTML:''; });
  try{ conn.send({t:'start', lang}); conn.send({t:'m', r, me:metaMirror()}); }catch(e){}
}
setInterval(()=>{
  if(!isHost || !remStarted) return;
  const out={}; let has=false;
  REGIONI_MIRROR.forEach(id=>{
    const el=document.getElementById(id); const h=el?el.innerHTML:"";
    if(mirrorCache[id]!==h){ mirrorCache[id]=h; out[id]=h; has=true; }
  });
  const me=metaMirror(), mk=JSON.stringify(me);
  const payload={t:'m'};
  if(mirrorCache._meta!==mk){ mirrorCache._meta=mk; payload.me=me; has=true; }
  if(Object.keys(out).length) payload.r=out;
  if(has) broadcast(payload);
},200);
function applyMirror(d){
  if(d.r) for(const id in d.r){
    const el=document.getElementById(id);
    if(el){
      el.innerHTML=d.r[id];
      if(id==='log') el.scrollTop=el.scrollHeight;
      // i blocchi pointer-events dell'host non valgono qui: i permessi li decide l'host
      if(id==='modal'||id==='actions') el.querySelectorAll('[style]').forEach(x=>{ if(x.style.pointerEvents) x.style.pointerEvents='auto'; });
    }
  }
  if(d.me){
    document.getElementById('overlay').style.display=d.me.ov;
    if(d.me.lg && d.me.lg!==lang){ lang=d.me.lg; applyLang(); }
    if(d.me.vi && d.me.vi!==vistaCorrente) vista(d.me.vi);
    const tb=document.getElementById('turnoBanner'); if(tb) tb.style.borderColor=d.me.bc||'';
    // il pulsante del dado si accende solo quando tocca a questo ospite (e non l'ha già tirato)
    const bd=document.getElementById('btnDado');
    if(bd) bd.disabled=!(d.me.tp && peer && d.me.tp===peer.id) || d.me.ov==='flex' || !!d.me.bl;
  }
}

/* ---- Clic dell'ospite: intercettati e spediti all'host ---- */
document.addEventListener('click',function(e){
  if(!guestMode) return;
  const b=e.target.closest('button');
  if(!b) return;
  // questi pulsanti agiscono solo sullo schermo locale dell'ospite
  if(['btnVista','btnAudio','btnRegole','btnInstall'].includes(b.id) || b.classList.contains('btnLang')) return;
  e.preventDefault(); e.stopPropagation();
  if(!myConn || !myConn.open) return;
  let rg=null, ix=0;
  if(b.id==='btnDado'){ rg='btnDado'; }
  else{
    for(const rid of ['modal','actions']){
      const el=document.getElementById(rid);
      if(el && el.contains(b)){ rg=rid; ix=[...el.querySelectorAll('button')].indexOf(b); break; }
    }
  }
  if(rg) myConn.send({t:'click', rg, ix, tx:(b.textContent||'').trim()});
},true);

/* ---- L'host esegue il clic di un ospite, solo se è il suo momento ---- */
function eseguiClickRemoto(sender,d){
  if(!remStarted || partitaFinita) return;
  const modalOpen=document.getElementById('overlay').style.display==='flex';
  const actor=(modalOpen && rispCorrente) ? rispCorrente : cur();
  if(!actor || actor.peer!==sender) return;
  if(d.rg==='btnDado'){ if(!modalOpen && players[turno]===actor) tiraDado(); return; }
  if(d.rg==='actions' && modalOpen) return;   // col modale aperto si clicca solo lì
  const root=document.getElementById(d.rg); if(!root) return;
  const btns=[...root.querySelectorAll('button')];
  const b=btns[d.ix];
  if(!b || b.disabled) return;
  if((b.textContent||'').trim()!==d.tx) return;  // il pulsante è cambiato nel frattempo
  b.click();
}

initSetup();
